# Meshtastic Device Variants Registry
# This is the single source of truth for supported devices.
# Architecture determines firmware format: esp32 → .bin, nrf52/rp2040 → .uf2
#
# To add a new variant:
#   1. Add an entry below with a valid PlatformIO environment name as the id
#   2. Verify the id matches `pio run --list-targets` in the firmware source
#   3. Set architecture to esp32, nrf52, or rp2040

